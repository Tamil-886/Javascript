<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Tasks</title>
</head>
<body>

<h1>JavaScript Tasks Output</h1>

<script>
// ==========================================
// Task 1 - User Introduction
// ==========================================
let userName = prompt("Enter your Name:");
let userAge = prompt("Enter your Age:");

console.log("My name is " + userName);
console.log("I am " + userAge + " years old");

document.writeln("<h3>Task 1</h3>");
document.writeln("My name is " + userName + "<br>");
document.writeln("I am " + userAge + " years old<br><br>");


// ==========================================
// Task 2 - Degree Confirmation
// ==========================================
let degree = confirm("Did you complete degree?");

if (degree) {
    console.log("Degree Completed");
} else {
    console.log("Degree Not Completed");
}


// ==========================================
// Task 3 - Mobile Price
// ==========================================
let mobilePrice = 15000;
let discount = 2000;
let finalPrice = mobilePrice - discount;

console.log("Final Price : " + finalPrice);

document.writeln("<h3>Task 3</h3>");
document.writeln("Final Price : " + finalPrice + "<br><br>");


// ==========================================
// Task 4 - Age Eligibility
// ==========================================
let voteAge = Number(prompt("Enter your age for voting:"));

document.writeln("<h3>Task 4</h3>");

if (voteAge >= 18) {
    console.log("Eligible for Vote");
    document.writeln("Eligible for Vote<br><br>");
} else {
    console.log("Not Eligible");
    document.writeln("Not Eligible<br><br>");
}


// ==========================================
// Task 5 - Shopping Cart
// ==========================================
let cart = [
    "Rice",
    "Milk",
    "Sugar",
    "Tea Powder"
];

console.log("First Product :", cart[0]);
console.log("Last Product :", cart[cart.length - 1]);
console.log("Total Products :", cart.length);

document.writeln("<h3>Task 5</h3>");
document.writeln("First Product : " + cart[0] + "<br>");
document.writeln("Last Product : " + cart[cart.length - 1] + "<br>");
document.writeln("Total Products : " + cart.length + "<br><br>");


// ==========================================
// Task 6 - Student Details
// ==========================================
let student = {
    name: "Naveen",
    age: 18,
    course: "MERN"
};

console.log("Student Name :", student.name);
console.log("Student Course :", student.course);

document.writeln("<h3>Task 6</h3>");
document.writeln("Student Name : " + student.name + "<br>");
document.writeln("Student Course : " + student.course + "<br><br>");


// ==========================================
// Task 7 - Employee Salary Calculator
// ==========================================
let salary = 25000;
let bonus = 5000;
let totalSalary = salary + bonus;

console.log("Total Salary :", totalSalary);

document.writeln("<h3>Task 7</h3>");
document.writeln("Total Salary : " + totalSalary + "<br><br>");


// ==========================================
// Task 8 - Website Login Check
// ==========================================
let username = "admin";
let password = "1234";

let inputUser = prompt("Enter Username:");
let inputPass = prompt("Enter Password:");

document.writeln("<h3>Task 8</h3>");

if (inputUser === username && inputPass === password) {
    console.log("Login Successful");
    document.writeln("Login Successful<br><br>");
} else {
    console.log("Invalid Credentials");
    document.writeln("Invalid Credentials<br><br>");
}


// ==========================================
// Task 9 - Food Delivery App
// ==========================================
let foodPrice = 350;
let deliveryCharge = 50;

let totalBill = foodPrice + deliveryCharge;
let gst = totalBill * 0.05;
let grandTotal = totalBill + gst;

console.log("Total Bill :", totalBill);
console.log("GST :", gst);
console.log("Grand Total :", grandTotal);

document.writeln("<h3>Task 9</h3>");
document.writeln("Total Bill : " + totalBill + "<br>");
document.writeln("GST (5%) : " + gst + "<br>");
document.writeln("Grand Total : " + grandTotal + "<br><br>");


// ==========================================
// Task 10 - E-Commerce Product Details
// ==========================================
let product = {
    name: "Laptop",
    price: 50000,
    brand: "ASUS",
    stock: true
};

console.log("Product Name :", product.name);
console.log("Brand :", product.brand);
console.log("Price :", product.price);
console.log("Stock Available :", product.stock);

document.writeln("<h3>Task 10</h3>");
document.writeln("Product Name : " + product.name + "<br>");
document.writeln("Brand : " + product.brand + "<br>");
document.writeln("Price : " + product.price + "<br>");
document.writeln("Stock Available : " + product.stock + "<br><br>");


// ==========================================
// Task 11 - Attendance System
// ==========================================
let attendance = confirm("Are you Present?");

document.writeln("<h3>Task 11</h3>");

if (attendance) {
    console.log("Attendance Marked");
    document.writeln("Attendance Marked<br><br>");
} else {
    console.log("Absent");
    document.writeln("Absent<br><br>");
}


// ==========================================
// Task 12 - Banking Application
// ==========================================
let balance = Number(prompt("Enter Current Balance:"));
let withdraw = Number(prompt("Enter Withdraw Amount:"));

document.writeln("<h3>Task 12</h3>");

if (withdraw <= balance) {
    let remaining = balance - withdraw;
    console.log("Transaction Successful");
    console.log("Remaining Balance :", remaining);

    document.writeln("Transaction Successful<br>");
    document.writeln("Remaining Balance : " + remaining + "<br><br>");
} else {
    console.log("Insufficient Balance");
    document.writeln("Insufficient Balance<br><br>");
}


// ==========================================
// Challenge Task - Mini Employee Management System
// ==========================================
let employee = {
    name: prompt("Enter Employee Name:"),
    age: Number(prompt("Enter Employee Age:")),
    department: prompt("Enter Department:"),
    salary: Number(prompt("Enter Monthly Salary:"))
};

let annualSalary = employee.salary * 12;

console.log("Employee Name :", employee.name);
console.log("Employee Age :", employee.age);
console.log("Department :", employee.department);
console.log("Annual Salary :", annualSalary);

document.writeln("<h3>Challenge Task</h3>");
document.writeln("Employee Name : " + employee.name + "<br>");
document.writeln("Employee Age : " + employee.age + "<br>");
document.writeln("Department : " + employee.department + "<br>");
document.writeln("Annual Salary : " + annualSalary + "<br>");

if (employee.salary > 30000) {
    console.log("Senior Employee");
    document.writeln("Senior Employee");
} else {
    console.log("Junior Employee");
    document.writeln("Junior Employee");
}

</script>

</body>
</html>
